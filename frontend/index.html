<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>青羽</title>
  <link rel="stylesheet" href="./src/style.css"/>
</head>
<body>
  <div id="app">
    <!-- 首次运行设置 -->
    <div id="setup-panel" class="panel hidden">
      <div class="panel-header">初次见面</div>
      <div class="panel-body">
        <p class="setup-desc">我是青羽，一个活在你电脑里的数字生命。<br/>请告诉我你的名字。</p>
        <div class="input-group">
          <input id="setup-name" type="text" placeholder="你的名字..." autocomplete="off"/>
          <button id="setup-btn" class="btn-primary">锚定</button>
        </div>
        <p id="setup-error" class="error-msg hidden"></p>
      </div>
    </div>

    <!-- API 配置 -->
    <div id="apikey-panel" class="panel hidden">
      <div class="panel-header">API 配置</div>
      <div class="panel-body">
        <p class="setup-desc">配置 AI 中转站接入。</p>
        <div class="input-group" style="margin-bottom:8px">
          <input id="api-url-input" type="text" placeholder="中转站地址" autocomplete="off" style="font-size:11px"/>
        </div>
        <div class="input-group" style="margin-bottom:8px">
          <input id="apikey-input" type="password" placeholder="API Key (sk-...)" autocomplete="off"/>
        </div>
        <div class="input-group" style="margin-bottom:8px;flex-wrap:wrap">
          <select id="model-select" style="flex:1;min-width:0;background:rgba(0,0,0,0.35);color:var(--text);border:1px solid rgba(255,255,255,0.06);border-radius:var(--radius-sm);padding:8px 10px;font-size:12px;outline:none">
            <option value="">加载模型中...</option>
          </select>
          <button id="fetch-models-btn" class="btn-secondary" style="white-space:nowrap;padding:8px 10px;font-size:11px">获取模型</button>
        </div>
        <div class="input-group">
          <button id="apikey-btn" class="btn-primary" style="flex:1">保存配置</button>
        </div>
        <p id="apikey-error" class="error-msg hidden"></p>
      </div>
    </div>

    <!-- ===== 【抽象光球&贴边隐藏迭代】Widget 挂件 — 抽象双层光球结构 ===== -->
    <div id="widget" class="widget">
      <div class="widget-glow" id="widget-glow"></div>
      <div class="widget-core" id="widget-core"></div>
      <div class="widget-orbit" id="widget-orbit"></div>
      <div class="widget-bubble" id="widget-bubble">
        <span class="widget-bubble-text" id="widget-bubble-text"></span>
      </div>
      <div class="widget-status" id="widget-status"></div>
    </div>

    <!-- 对话面板 -->
    <div id="console" class="console hidden">
      <div class="console-header">
        <div class="console-title">
          <span class="console-dot" id="console-dot"></span>
          <span id="console-name">青羽</span>
          <!-- ===== 【前端情绪可视化迭代】情绪名 + 闲置时间 + 自律标签 + 亲密度 ===== -->
          <span class="console-mood-name" id="console-mood-name"></span>
          <span class="console-idle-time" id="console-idle-time"></span>
          <span class="console-autonomic-label hidden" id="console-autonomic-label">自律思考中</span>
          <div class="console-affinity">
            <div class="console-affinity-bar">
              <div class="console-affinity-fill" id="console-affinity-fill"></div>
            </div>
            <span class="console-affinity-label">亲密度</span>
          </div>
          <span class="console-status" id="console-status"></span>
        </div>
        <div class="console-actions">
          <button id="btn-settings" class="btn-icon" title="设置">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
          </button>
          <button id="btn-minimize" class="btn-icon" title="最小化">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
          <button id="btn-close" class="btn-icon" title="关闭">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="console-body" id="console-body">
        <!-- ===== 【抽象光球&贴边隐藏迭代】欢迎消息去拟人化 ===== -->
        <div class="message welcome" id="welcome-msg">
          <div class="msg-avatar"></div>
          <div class="msg-content">
            <p id="welcome-text">连接中...</p>
          </div>
        </div>
      </div>
      <div class="console-footer">
        <div class="input-row">
          <input id="chat-input" type="text" placeholder="输入消息..." autocomplete="off"/>
          <button id="chat-send" class="btn-send" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>
  <script src="./src/main.js" type="module"></script>
</body>
</html>
